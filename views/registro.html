<style>
    /* Estilos generales para el cuerpo o contenedor */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #121212; /* Fondo oscuro profesional */
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    /* Diseño del contenedor del formulario */
    form {
        background-color: #1e1e1e;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 350px;
    }

    /* Estilo de las etiquetas */
    label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #bb86fc; /* Un toque de color morado/tecnológico */
        margin-bottom: 5px;
        display: inline-block;
    }

    /* Estilo de los campos de entrada y select */
    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        margin-bottom: 20px;
        border: 1px solid #333;
        border-radius: 6px;
        background-color: #2c2c2c;
        color: white;
        box-sizing: border-box; /* Evita que el padding ensanche el input */
        transition: border-color 0.3s ease;
    }

    /* Efecto al hacer clic en los inputs */
    input:focus, select:focus {
        outline: none;
        border-color: #03dac6; /* Color turquesa al enfocar */
    }

    /* Estilo del botón */
    button {
        width: 100%;
        padding: 12px;
        background-color: #03dac6;
        border: none;
        border-radius: 6px;
        color: #000;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s, background-color 0.3s;
    }

    button:hover {
        background-color: #01bca9;
        transform: translateY(-2px);
    }

    button:active {
        transform: translateY(0);
    }
</style>

<script src="control/registro.js" defer></script>

<form>
    <label for="nombre">Nombre:</label><br>
    <input type="text" id="nombre" placeholder="Nombre">
    <br>

    <label for="email">Correo electrónico:</label><br>
    <input type="email" id="email" placeholder="Correo electrónico">
    <br>

    <label for="password">Contraseña:</label><br>
    <input type="password" id="password" placeholder="Contraseña">
    <br>

    <label for="cars">Tipo de usuario:</label><br>
    <select name="cars" id="cars">
        <option value="admin">Administrador</option>
        <option value="user">Usuario</option>
    </select>
    <br><br>

    <button type="button" onclick="registrar()">Registrar</button>
</form>
