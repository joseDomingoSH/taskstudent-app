<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Vertical Usuario</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2ff;display:flex}
.sidebar{width:240px;height:100vh;background:#2563eb;color:#fff;padding:20px;box-sizing:border-box}
.sidebar h2{text-align:center;margin-top:0}
.sidebar a{display:block;color:#fff;text-decoration:none;padding:12px;border-radius:10px;margin:8px 0;background:#3b82f6}
.sidebar a:hover{background:#60a5fa}
.content{flex:1;padding:30px}
.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
</style>
</head>
<body>
<div class="sidebar">
<h2>Usuario</h2>
<a href="#">Inicio</a>
<a href="#">Mi Perfil</a>
<a href="#">Mis Compras</a>
<a href="#">Soporte</a>
<a href="#">Cerrar Sesión</a>
</div>
<div class="content">
<div class="card">
<h1>Panel de Usuario</h1>
<p>Aquí el usuario puede consultar su información y usar las funciones disponibles.</p>
</div>
</div>
</body>
</html>
